<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing & Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0B0E2E;color:#E2E8F0;font-family:'Inter',sans-serif}
  .wrap{padding:18px 22px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .eyebrow{font:700 10px/1;letter-spacing:.2em;text-transform:uppercase;color:#9CA3AF;margin-bottom:10px}
  .rad-row{display:flex;gap:10px;align-items:flex-end}
  .rad{background:#171B5E;border:1px solid rgba(240,151,8,.15);width:64px;height:64px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font:500 10px/1 'JetBrains Mono',monospace;color:#9CA3AF}
  .sp-row{display:flex;gap:8px;align-items:center}
  .sp-bar{background:#F09708;height:12px;border-radius:2px}
  .sp-lbl{font:500 10px/1 'JetBrains Mono',monospace;color:#9CA3AF;min-width:32px}
</style></head>
<body><div class="wrap">
  <div>
    <div class="eyebrow">Radii</div>
    <div class="rad-row">
      <div class="rad" style="border-radius:6px">6</div>
      <div class="rad" style="border-radius:10px">10</div>
      <div class="rad" style="border-radius:12px">12</div>
      <div class="rad" style="border-radius:16px">16</div>
      <div class="rad" style="border-radius:20px">20</div>
    </div>
  </div>
  <div>
    <div class="eyebrow">Spacing · 4px base</div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <div class="sp-row"><span class="sp-lbl">4</span><span class="sp-bar" style="width:4px"></span></div>
      <div class="sp-row"><span class="sp-lbl">8</span><span class="sp-bar" style="width:8px"></span></div>
      <div class="sp-row"><span class="sp-lbl">12</span><span class="sp-bar" style="width:12px"></span></div>
      <div class="sp-row"><span class="sp-lbl">16</span><span class="sp-bar" style="width:16px"></span></div>
      <div class="sp-row"><span class="sp-lbl">24</span><span class="sp-bar" style="width:24px"></span></div>
      <div class="sp-row"><span class="sp-lbl">32</span><span class="sp-bar" style="width:32px"></span></div>
    </div>
  </div>
</div></body></html>
