<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0B0E2E;color:#E2E8F0;font-family:'Pretendard','Apple SD Gothic Neo',sans-serif}
  .wrap{padding:20px;display:flex;flex-direction:column;gap:14px}
  .field{position:relative}
  .field svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#6B7280}
  input,textarea,select{width:100%;box-sizing:border-box;background:rgba(11,14,46,.6);color:#E2E8F0;border:1px solid rgba(255,255,255,.05);padding:12px 14px 12px 36px;border-radius:14px;font:400 13px 'Pretendard','Apple SD Gothic Neo',sans-serif;outline:none;transition:all .3s}
  input:focus,textarea:focus{border-color:rgba(240,151,8,.5);box-shadow:0 0 15px rgba(240,151,8,.15)}
  input::placeholder,textarea::placeholder{color:#6B7280}
  textarea{padding-left:14px;resize:none;min-height:54px}
  .lbl{font:500 10px/1 'JetBrains Mono',monospace;color:#6B7280;letter-spacing:.1em;margin-bottom:-8px}
</style></head>
<body><div class="wrap">
  <span class="lbl">SEARCH (ICON PREFIX)</span>
  <div class="field">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input placeholder="Search in Drive…">
  </div>
  <span class="lbl">CHAT INPUT · FOCUS STATE</span>
  <textarea style="border-color:rgba(240,151,8,.5);box-shadow:0 0 15px rgba(240,151,8,.15)" placeholder="AI에게 데이터 분석 요청…">오늘 Force 비교해줘</textarea>
</div></body></html>
