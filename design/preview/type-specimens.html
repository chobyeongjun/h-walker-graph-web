<!doctype html>
<html><head><meta charset="utf-8"><title>Type Specimens</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0B0E2E;color:#E2E8F0;font-family:'Pretendard','Apple SD Gothic Neo',sans-serif}
  .wrap{padding:18px 22px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:rgba(23,27,94,.3);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:14px}
  .eyebrow{font:700 10px/1 'Pretendard',sans-serif;letter-spacing:.2em;text-transform:uppercase;color:#9CA3AF;margin-bottom:10px}
  .big{font-size:34px;font-weight:800;letter-spacing:-0.02em;color:#fff;line-height:1}
  .weights{display:flex;gap:10px;margin-top:12px;align-items:baseline;color:#E2E8F0;font-size:16px}
  .weights span{display:inline-flex;flex-direction:column;align-items:center;gap:4px}
  .weights em{font-style:normal;font-size:9px;letter-spacing:.08em;color:#6B7280;font-weight:500}
  .mono{font-family:'JetBrains Mono',monospace}
  .sample{font-family:'JetBrains Mono',monospace;color:#00FFB2;font-size:13px;margin-top:6px}
  .num{font-family:'JetBrains Mono',monospace;font-weight:600;color:#F09708;font-size:22px}
  .meta{color:#6B7280;font-size:10px;margin-top:10px;letter-spacing:.05em}
</style></head>
<body><div class="wrap">
  <div class="card">
    <div class="eyebrow">Sans · Pretendard</div>
    <div class="big">Aa 한글</div>
    <div class="weights">
      <span style="font-weight:300">Aa<em>300</em></span>
      <span style="font-weight:400">Aa<em>400</em></span>
      <span style="font-weight:500">Aa<em>500</em></span>
      <span style="font-weight:600">Aa<em>600</em></span>
      <span style="font-weight:700">Aa<em>700</em></span>
      <span style="font-weight:800">Aa<em>800</em></span>
    </div>
    <div class="meta">UI · body · labels · Korean-first</div>
  </div>
  <div class="card">
    <div class="eyebrow" style="color:#F09708">Mono · JetBrains</div>
    <div class="num">0.128 m/s</div>
    <div class="sample">L_ActForce_N = 42.7</div>
    <div class="sample" style="color:#9CA3AF">ID: X7K2Q9</div>
    <div class="meta">Data · IDs · status · axis</div>
  </div>
</div></body></html>
