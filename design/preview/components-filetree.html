<!doctype html>
<html><head><meta charset="utf-8"><title>File Tree</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0B0E2E;color:#E2E8F0;font-family:'Pretendard','Apple SD Gothic Neo',sans-serif}
  .wrap{padding:16px 18px;font-size:12px}
  .folder,.file{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:10px;cursor:pointer;transition:background .2s}
  .folder{color:#E2E8F0}
  .folder:hover{background:rgba(255,255,255,.04)}
  .file{color:#9CA3AF}
  .file:hover{background:rgba(240,151,8,.1);color:#fff}
  .chev{color:#6B7280}
  .chev.open{transform:rotate(90deg)}
  .fi{color:rgba(240,151,8,.8)}
  .fli{color:#6B7280}
  .file:hover .fli{color:#F09708}
  .nested{margin-left:12px;border-left:1px solid rgba(255,255,255,.05);padding-left:4px}
</style></head>
<body><div class="wrap">
  <div class="folder"><svg class="chev open" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="9 18 15 12 9 6"/></svg><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="fi"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><span>2026-04-15 trial</span></div>
  <div class="nested">
    <div class="file"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="fli"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>trial_1_force.csv</div>
    <div class="file" style="background:rgba(240,151,8,.1);color:#fff"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#F09708" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>trial_2_imu.csv</div>
    <div class="file"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="fli"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>gait_events.csv</div>
  </div>
  <div class="folder"><svg class="chev" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="9 18 15 12 9 6"/></svg><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="fi"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><span>2026-04-08 pilot</span></div>
</div></body></html>
