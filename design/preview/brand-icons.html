<!doctype html>
<html><head><meta charset="utf-8"><title>Icon System</title>
<style>
  html,body{margin:0;background:#0B0E2E;color:#E2E8F0;font-family:'Inter',sans-serif}
  .wrap{padding:20px}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px}
  .cell{background:rgba(23,27,94,.3);border:1px solid rgba(255,255,255,.05);border-radius:10px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;color:#E2E8F0}
  .cell svg{color:inherit}
  .accent{color:#F09708}
  .lbl{font:700 10px/1;letter-spacing:.2em;text-transform:uppercase;color:#9CA3AF;margin-bottom:10px}
  .note{font:500 10px/1.4 'JetBrains Mono',monospace;color:#6B7280;margin-top:12px}
</style></head>
<body><div class="wrap">
  <div class="lbl">Feather · 2px stroke · currentColor</div>
  <div class="grid">
    <div class="cell accent"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
    <div class="cell accent"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></div>
    <div class="cell"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
    <div class="cell"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
    <div class="cell"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
    <div class="cell"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
    <div class="cell"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></div>
    <div class="cell"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="9 18 15 12 9 6"/></svg></div>
  </div>
  <div class="note">lucide-react / feather · 18–22px · 2–2.5 stroke · no fills</div>
</div></body></html>
