<!doctype html>
<html><head><meta charset="utf-8"><title>Chat Bubbles</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0B0E2E;color:#E2E8F0;font-family:'Pretendard','Apple SD Gothic Neo',sans-serif}
  .wrap{padding:20px;display:flex;flex-direction:column;gap:10px}
  .row{display:flex}
  .user{justify-content:flex-end}
  .ai{justify-content:flex-start}
  .bubble{max-width:85%;padding:10px 14px;font-size:13px;line-height:1.5;box-shadow:0 4px 12px rgba(0,0,0,.25)}
  .bubble-user{background:linear-gradient(135deg,#171B5E,#0B0E2E);color:#fff;border:1px solid rgba(255,255,255,.1);border-radius:16px 16px 4px 16px}
  .bubble-ai{background:rgba(23,27,94,.3);color:#E2E8F0;border:1px solid rgba(255,255,255,.05);backdrop-filter:blur(8px);border-radius:16px 16px 16px 4px}
  .cursor{display:inline-block;width:6px;height:14px;background:rgba(129,140,248,.6);border-radius:2px;animation:blink 1s infinite;vertical-align:middle}
  @keyframes blink{50%{opacity:.3}}
</style></head>
<body><div class="wrap">
  <div class="row user"><div class="bubble bubble-user">오늘 실험 Force 비교해줘</div></div>
  <div class="row ai"><div class="bubble bubble-ai">Force 분석을 시작합니다. L/R_ActForce_N 컬럼에서 peak force와 대칭성을 계산 중…<span class="cursor"></span></div></div>
</div></body></html>
