<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0B0E2E;font-family:'Inter',sans-serif;color:#E2E8F0}
  .wrap{padding:18px 20px}
  .eyebrow{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#9CA3AF;margin:0 0 10px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .item{background:rgba(23,27,94,.3);border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px}
  .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
  .hex{font-family:'JetBrains Mono',monospace;font-size:10px;color:#9CA3AF;margin-left:auto}
</style></head>
<body><div class="wrap">
<div class="eyebrow">Semantic</div>
<div class="grid">
  <div class="item"><span class="dot" style="background:#34d399;box-shadow:0 0 8px #34d39988"></span><span class="lbl" style="color:#34d399">Success</span><span class="hex">#34D399</span></div>
  <div class="item"><span class="dot" style="background:#fbbf24;box-shadow:0 0 8px #fbbf2488"></span><span class="lbl" style="color:#fbbf24">Warning</span><span class="hex">#FBBF24</span></div>
  <div class="item"><span class="dot" style="background:#f87171;box-shadow:0 0 8px #f8717188"></span><span class="lbl" style="color:#f87171">Danger</span><span class="hex">#F87171</span></div>
  <div class="item"><span class="dot" style="background:#00FFB2;box-shadow:0 0 10px #00FFB2"></span><span class="lbl" style="color:#00FFB2">Live / Online</span><span class="hex">#00FFB2</span></div>
  <div class="item"><span class="dot" style="background:#F09708;box-shadow:0 0 10px #F09708cc"></span><span class="lbl" style="color:#F09708">Active / CTA</span><span class="hex">#F09708</span></div>
  <div class="item"><span class="dot" style="background:#6B7280"></span><span class="lbl" style="color:#9CA3AF">Idle / Muted</span><span class="hex">#6B7280</span></div>
</div>
</div></body></html>
