<!doctype html>
<html><head><meta charset="utf-8"><title>Status Indicators</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0B0E2E;color:#E2E8F0;font-family:'Inter',sans-serif}
  .wrap{padding:20px;display:flex;flex-direction:column;gap:12px}
  .row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(23,27,94,.3);border:1px solid rgba(255,255,255,.05);border-radius:12px}
  .dot{width:8px;height:8px;border-radius:50%;flex:none;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
  .live-mint{background:#00FFB2;box-shadow:0 0 10px #00FFB2}
  .live-orange{background:#F09708;box-shadow:0 0 8px #F09708}
  .idle{background:#374151;animation:none}
  .mono{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.05em}
  .lbl{color:#9CA3AF;font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase}
</style></head>
<body><div class="wrap">
  <div class="row"><span class="dot live-mint"></span><span class="mono" style="color:#00FFB2">GEMMA 4:E4B</span><span style="margin-left:auto;color:#6B7280;font-size:10px">LLM online</span></div>
  <div class="row"><span class="dot live-orange"></span><span class="lbl" style="color:#E2E8F0">2 FILE SELECTED</span></div>
  <div class="row"><span class="dot idle"></span><span class="mono" style="color:#6B7280">DRIVE · OFFLINE</span></div>
  <div class="row"><span class="dot live-orange"></span><span class="lbl" style="color:#F09708">● LIVE</span><span style="margin-left:auto;color:#6B7280;font-size:10px">streaming</span></div>
</div></body></html>
