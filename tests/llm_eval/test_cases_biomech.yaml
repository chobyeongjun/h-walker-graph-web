# Biomechanics & External Data Test Cases
# Covers: anatomical planes, joint moments/powers/angles, body parts,
# MoCap/Vision data, muscle activity, GRF, spatiotemporal parameters.
#
# Goal: LLM must distinguish between:
#   - Joint moment (Nm) vs Force (N)
#   - Hip vs Knee vs Ankle
#   - Sagittal vs Frontal vs Transverse plane
#   - Angle vs Angular velocity vs Moment vs Power
#   - MoCap data vs H-Walker firmware CSV

# ========================================
# CATEGORY: Anatomical Planes (15 cases)
# ========================================
- id: plane_01
  category: anatomical_plane
  query: "시상면 무릎 각도"
  expect:
    action: plot
    analysis_type: position
    columns: ["Knee_Flexion_deg"]

- id: plane_02
  category: anatomical_plane
  query: "sagittal plane hip angle"
  expect:
    action: plot
    analysis_type: position
    columns: ["Hip_Flexion_deg"]

