# ========================================
# CATEGORY 10: Korean colloquial (10 cases)
# ========================================
- id: colloq_01
  category: colloquial
  query: "힘이 어떻게 나오는지 봐줘"
  expect:
    action: plot
    analysis_type: force

- id: colloq_02
  category: colloquial
  query: "발 디디는 타이밍 확인"
  expect:
    action: plot
    analysis_type_any_of: [gait, gcp]

- id: colloq_03
  category: colloquial
  query: "왼쪽 다리가 어떻게 움직이는지"
  expect:
    action: plot
    sides: [left]

- id: colloq_04
  category: colloquial
  query: "속도 어떤가요"
  expect:
    action: plot
    analysis_type: velocity

- id: colloq_05
  category: colloquial
  query: "보행주기 평균 힘"
  expect:
    action: plot
    analysis_type: force
    normalize_gcp: true

- id: colloq_06
  category: colloquial
  query: "오른쪽 무릎 각도"
  expect:
    action: plot
    sides: [right]

- id: colloq_07
  category: colloquial
  query: "걷는 동안 토크"
  expect:
    action: plot
    analysis_type: current

- id: colloq_08
  category: colloquial
  query: "한 사이클에서 힘 패턴"
  expect:
    action: plot
    analysis_type: force
    normalize_gcp: true

- id: colloq_09
  category: colloquial
  query: "좌우 힘 밸런스"
  expect:
    action: plot
    analysis_type: force
    sides: [both]

- id: colloq_10
  category: colloquial
  query: "피치각 양쪽"
  expect:
    action: plot
    analysis_type: imu
    sides: [both]

