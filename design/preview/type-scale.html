<!doctype html>
<html><head><meta charset="utf-8"><title>Text Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0B0E2E;color:#E2E8F0;font-family:'Pretendard','Apple SD Gothic Neo',sans-serif}
  .wrap{padding:18px 22px}
  .row{display:flex;align-items:baseline;gap:14px;padding:8px 0;border-bottom:1px dashed rgba(255,255,255,.06)}
  .row:last-child{border:0}
  .tag{font:500 10px/1 'JetBrains Mono',monospace;color:#6B7280;min-width:72px;letter-spacing:.05em}
  .fg0{color:#fff}.fg1{color:#E2E8F0}.fg2{color:#9CA3AF}.fg3{color:#6B7280}
</style></head>
<body><div class="wrap">
  <div class="row"><span class="tag">fg-0 #FFF</span><span class="fg0" style="font-weight:800;font-size:20px;letter-spacing:-0.01em">Paper Studio · 보행 분석 도구</span></div>
  <div class="row"><span class="tag">fg-1 #E2E8F0</span><span class="fg1" style="font-size:13px">Default body text — chat bubble content, 보행 데이터.</span></div>
  <div class="row"><span class="tag">fg-2 #9CA3AF</span><span class="fg2" style="font-size:12px">Secondary — captions, file counts, axis labels.</span></div>
  <div class="row"><span class="tag">fg-3 #6B7280</span><span class="fg3" style="font-size:12px">Tertiary — placeholders, keyboard hints.</span></div>
  <div class="row"><span class="tag">accent</span><span style="color:#F09708;font-weight:700;font-size:13px;letter-spacing:.15em;text-transform:uppercase">Target Detected</span></div>
  <div class="row"><span class="tag">live</span><span style="color:#00FFB2;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700">GEMMA 4:E4B</span></div>
</div></body></html>
