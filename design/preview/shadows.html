<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows & Glow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0B0E2E;color:#E2E8F0;font-family:'Pretendard','Apple SD Gothic Neo',sans-serif}
  .wrap{padding:22px 22px;display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .box{height:68px;border-radius:14px;background:#171B5E;border:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font:600 11px/1 'Pretendard','Apple SD Gothic Neo',sans-serif;color:#fff;letter-spacing:.1em;text-transform:uppercase}
  .cap{font:500 10px/1.2 'JetBrains Mono',monospace;color:#6B7280;margin-top:8px;text-align:center}
  .orange{background:#F09708;box-shadow:0 0 20px rgba(240,151,8,.4)}
  .orange-sm{background:#F09708;box-shadow:0 0 15px rgba(240,151,8,.2)}
  .mint{background:#0D1138;color:#00FFB2;box-shadow:inset 0 0 0 1px #00FFB2,0 0 14px rgba(0,255,178,.4)}
  .deep{box-shadow:0 10px 40px rgba(0,0,0,.5)}
</style></head>
<body><div class="wrap">
  <div><div class="box orange-sm">CTA idle</div><div class="cap">glow-orange-sm</div></div>
  <div><div class="box orange">CTA hover</div><div class="cap">glow-orange</div></div>
  <div><div class="box mint">LIVE</div><div class="cap">glow-mint</div></div>
  <div><div class="box deep">Elevated</div><div class="cap">shadow-deep</div></div>
</div></body></html>
