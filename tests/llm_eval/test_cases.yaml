# LLM Evaluation Test Cases
# Each case defines: query, expected action, expected fields of AnalysisRequest
# Used by run_eval.py to measure accuracy

# ========================================
# CATEGORY 1: Basic Force (10 cases)
# ========================================
- id: force_01
  category: basic_force
  query: "Force 그래프 보여줘"
  expect:
    action: plot
    analysis_type: force
    sides: [both]

- id: force_02
  category: basic_force
  query: "힘 그래프"
  expect:
    action: plot
    analysis_type: force

- id: force_03
  category: basic_force
  query: "케이블 힘 보여줘"
  expect:
    action: plot
    analysis_type: force

- id: force_04
  category: basic_force
  query: "Force tracking 확인"
  expect:
    action: plot
    analysis_type: force

- id: force_05
  category: basic_force
  query: "힘 추종 성능"
  expect:
    action: plot
    analysis_type: force

- id: force_06
  category: basic_force
  query: "Desired vs Actual force"
  expect:
    action: plot
    analysis_type: force

- id: force_07
  category: basic_force
  query: "Cable force profile"
  expect:
    action: plot
    analysis_type: force

- id: force_08
  category: basic_force
  query: "admittance 응답 확인"
  expect:
    action: plot
    analysis_type: force

- id: force_09
  category: basic_force
  query: "힘 추적 에러"
  expect:
    action: plot
    analysis_type: force

- id: force_10
  category: basic_force
  query: "Force 프로파일"
  expect:
    action: plot
    analysis_type: force

# ========================================
# CATEGORY 2: Sides Filter (8 cases)
# ========================================
- id: sides_01
  category: sides
  query: "왼쪽 힘"
  expect:
    action: plot
    analysis_type: force
    sides: [left]

- id: sides_02
  category: sides
  query: "오른쪽만 보여줘"
  expect:
    action: plot
    sides: [right]

- id: sides_03
  category: sides
  query: "left force"
  expect:
    action: plot
    analysis_type: force
    sides: [left]

- id: sides_04
  category: sides
  query: "right side only"
  expect:
    action: plot
    sides: [right]

- id: sides_05
  category: sides
  query: "L_ActForce_N 보여줘"
  expect:
    action: plot
    sides: [left]

- id: sides_06
  category: sides
  query: "양쪽 비교"
  expect:
    action: plot
    sides: [both]

- id: sides_07
  category: sides
  query: "왼쪽 IMU 각도"
  expect:
    action: plot
    analysis_type: imu
    sides: [left]

- id: sides_08
  category: sides
  query: "오른쪽 다리 속도"
  expect:
    action: plot
    analysis_type: velocity
    sides: [right]

# ========================================
# CATEGORY 3: GCP Normalization (7 cases)
# ========================================
- id: gcp_01
  category: gcp
  query: "보행 분석"
  expect:
    action: plot
    analysis_type: gait
    normalize_gcp: true

- id: gcp_02
  category: gcp
  query: "GCP로 정규화해서 보여줘"
  expect:
    action: plot
    normalize_gcp: true

- id: gcp_03
  category: gcp
  query: "보행주기별 힘"
  expect:
    action: plot
    analysis_type: force
    normalize_gcp: true

- id: gcp_04
  category: gcp
  query: "gait cycle 0-100%"
  expect:
    action: plot
    normalize_gcp: true

- id: gcp_05
  category: gcp
  query: "스트라이드 평균"
  expect:
    action: plot
    normalize_gcp: true

- id: gcp_06
  category: gcp
  query: "보행 패턴 분석"
  expect:
    action: plot
    analysis_type: gait

- id: gcp_07
  category: gcp
  query: "걸음걸이 평균 프로파일"
  expect:
    action: plot
    normalize_gcp: true

# ========================================
# CATEGORY 4: Motion Data (8 cases)
# ========================================
- id: motion_01
  category: motion
  query: "IMU 각도"
  expect:
    action: plot
    analysis_type: imu

- id: motion_02
  category: motion
  query: "Pitch 각도"
  expect:
    action: plot
    analysis_type: imu

- id: motion_03
  category: motion
  query: "속도 프로파일"
  expect:
    action: plot
    analysis_type: velocity

- id: motion_04
  category: motion
  query: "모터 위치"
  expect:
    action: plot
    analysis_type: position

- id: motion_05
  category: motion
  query: "전류 그래프"
  expect:
    action: plot
    analysis_type: current

- id: motion_06
  category: motion
  query: "자이로"
  expect:
    action: plot
    analysis_type: gyro

- id: motion_07
  category: motion
  query: "가속도"
  expect:
    action: plot
    analysis_type: accel

- id: motion_08
  category: motion
  query: "관절 각도 변화"
  expect:
    action: plot
    # accept either imu or position (관절 각도는 IMU나 모터 엔코더 둘 다 가능)
    analysis_type_any_of: [imu, position]

