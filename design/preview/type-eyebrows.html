<!doctype html>
<html><head><meta charset="utf-8"><title>Eyebrow Labels</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0B0E2E;color:#E2E8F0;font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;padding:0}
  .wrap{padding:20px 24px}
  .row{display:flex;align-items:center;gap:18px;padding:10px 0;border-bottom:1px dashed rgba(255,255,255,.06)}
  .row:last-child{border:0}
  .lbl{font:500 10px/1 'JetBrains Mono',monospace;color:#6B7280;min-width:100px}
  .ey-gray{font:700 11px/1 'Pretendard',sans-serif;letter-spacing:.2em;text-transform:uppercase;color:#9CA3AF}
  .ey-orange{font:700 11px/1 'Pretendard',sans-serif;letter-spacing:.2em;text-transform:uppercase;color:#F09708}
  .ey-mint{font:700 11px/1 'Pretendard',sans-serif;letter-spacing:.2em;text-transform:uppercase;color:#00FFB2}
  .ey-tight{font:700 10px/1 'Pretendard',sans-serif;letter-spacing:-0.02em;text-transform:uppercase;color:#fff}
</style></head>
<body><div class="wrap">
  <div class="row"><span class="lbl">gray/widest</span><span class="ey-gray">Drive Explorer</span></div>
  <div class="row"><span class="lbl">accent</span><span class="ey-orange">Target Detected</span></div>
  <div class="row"><span class="lbl">mint</span><span class="ey-mint">● Live</span></div>
  <div class="row"><span class="lbl">tight bold</span><span class="ey-tight">RUN ANALYSIS · 분석 실행</span></div>
  <div class="row"><span class="lbl">mono data</span><span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#9CA3AF">ID: X7K2Q9</span></div>
</div></body></html>
