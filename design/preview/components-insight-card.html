<!doctype html>
<html><head><meta charset="utf-8"><title>Insight Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0B0E2E;color:#E2E8F0;font-family:'Pretendard','Apple SD Gothic Neo',sans-serif}
  .wrap{padding:18px}
  .card{background:rgba(23,27,94,.4);backdrop-filter:blur(12px);border-radius:16px;padding:14px;border:1px solid rgba(255,255,255,.05);box-shadow:0 10px 40px rgba(0,0,0,.4)}
  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .head-left{display:flex;align-items:center;gap:10px}
  .icon{width:22px;height:22px;border-radius:8px;background:rgba(240,151,8,.2);display:flex;align-items:center;justify-content:center;color:#F09708}
  .ey{font:700 11px/1;letter-spacing:.2em;text-transform:uppercase;color:#F09708}
  .id{font:500 9px 'JetBrains Mono',monospace;color:#9CA3AF;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);padding:3px 8px;border-radius:999px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
  .cell{background:rgba(11,14,46,.6);border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:8px 10px}
  .cell-lbl{font:700 9px/1;letter-spacing:-0.01em;text-transform:uppercase;color:#6B7280;margin-bottom:4px}
  .cell-val{font:500 12px 'JetBrains Mono',monospace;color:#fff}
  .ok{color:#00FFB2;display:flex;align-items:center;gap:6px}
  .chip{background:rgba(240,151,8,.1);color:#F09708;border:1px solid rgba(240,151,8,.2);padding:3px 8px;border-radius:6px;font:500 10px 'Pretendard','Apple SD Gothic Neo',sans-serif;display:inline-block}
</style></head>
<body><div class="wrap">
<div class="card">
  <div class="head">
    <div class="head-left">
      <div class="icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      <span class="ey">Target Detected</span>
    </div>
    <span class="id">ID: X7K2Q9</span>
  </div>
  <div class="grid">
    <div class="cell"><div class="cell-lbl">Analysis Type</div><div class="cell-val">force</div></div>
    <div class="cell"><div class="cell-lbl">Normalization</div><div class="cell-val ok"><span style="width:6px;height:6px;border-radius:50%;background:#00FFB2;box-shadow:0 0 5px #00FFB2"></span>ACTIVE</div></div>
  </div>
  <div class="cell"><div class="cell-lbl">Selected Columns</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      <span class="chip">L_ActForce_N</span><span class="chip">R_ActForce_N</span><span class="chip">L_DesForce_N</span>
    </div>
  </div>
</div>
</div></body></html>
